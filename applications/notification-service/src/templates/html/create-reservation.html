<body style="margin:0; padding:0; background-color:#f4f4f4; font-family:Arial, sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding:20px;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff; padding:30px; border-radius:8px;">
          
          <tr>
            <td align="center">
              <h2 style="margin:0; color:#333;">Votre réservation est confirmée</h2>
              <p style="color:#777;">Merci pour votre réservation</p>
            </td>
          </tr>

          <tr>
            <td style="padding:20px 0;">
              <table width="100%" cellpadding="10" cellspacing="0" style="background:#f9f9f9; border-radius:6px;">
                <tr>
                  <td><strong>Numéro de réservation :</strong></td>
                  <td align="right">#{{reservationId}}</td>
                </tr>
                <tr>
                  <td><strong>Date :</strong></td>
                  <td align="right">{{date}}</td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td align="center" style="padding-top:30px; color:#999; font-size:12px;">
              Cet email est automatique, merci de ne pas y répondre.
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
