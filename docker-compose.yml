version: "3.9"

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: kalo
      RABBITMQ_DEFAULT_PASS: kalo
    volumes:
      - rabbitmq-lib:/var/lib/rabbitmq/
      - rabbitmq-log:/var/log/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kalo
      POSTGRES_PASSWORD: kalo
      POSTGRES_DB: kalo_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalo -d kalo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: dbadminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_started

  api:
    build: ./api
    container_name: api
    restart: always
    ports:
      - "3000:8000"
    environment:
      RABBITMQ_URL: amqp://kalo:kalo@rabbitmq:5672
      DATABASE_URL: postgresql://kalo:kalo@postgres:5432/kalo_db
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"  # interface web
      - "1025:1025"  # SMTP

  notification-service:
    build: ./applications/notification-service
    container_name: notification-service
    restart: always
    environment:
      RABBITMQ_URL: amqp://kalo:kalo@rabbitmq:5672
      DATABASE_URL: postgresql://kalo:kalo@postgres:5432/kalo_db
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
    ports:
      - "3001:8001"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build: ./applications/Frontend
    container_name: frontend
    restart: always
    ports:
      - "8082:80"
    depends_on:
      - api

volumes:
  rabbitmq-lib:
  rabbitmq-log:
  postgres-data:
